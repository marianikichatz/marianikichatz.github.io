<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maria-Niki Chatzantoni | Bioinformatics</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Syne:wght@400;500;600;700&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Pastel, cute palette */
      --bg-main:      #fff7cc;
      --bg-soft:      #fffdf4;
      --card:         #ffffff;

      --pink-main:    #ff3f86;
      --pink-soft:    #ff8fb1;
      --pink-muted:   #ffd6e2;

      --text-main:    #2a1f2d;
      --text-soft:    #6e5a73;

      --border:       rgba(255, 105, 160, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      overflow-x: hidden;
      transition: all 0.2s ease;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .hero-left {
      background: #fff3a6;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 90px 64px;
      position: relative;
      overflow: hidden;
    }

    .hero-left .deco-circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .deco-c1 {
      width: 320px; height: 320px;
      background: var(--pink-muted);
      opacity: 0.5;
      top: -80px; right: -80px;
      filter: blur(2px);
    }
    .deco-c2 {
      width: 180px; height: 180px;
      background: #ffe9a8;
      opacity: 0.7;
      bottom: 60px; left: -50px;
      filter: blur(2px);
    }
    .deco-line {
      position: absolute;
      bottom: 110px;
      right: 60px;
      width: 120px;
      height: 1px;
      background: var(--pink-main);
      opacity: 0.25;
    }

    .hero-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--pink-main);
      opacity: 0.7;
      margin-bottom: 28px;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(3.5rem, 5.5vw, 5.5rem);
      color: var(--pink-main);
      line-height: 1.0;
      margin-bottom: 6px;
    }

    .hero-name em {
      font-style: italic;
      font-weight: 700;
      color: var(--pink-main);
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--pink-main);
      margin-bottom: 32px;
    }

    .hero-desc {
      font-size: 0.88rem;
      line-height: 1.8;
      color: var(--text-soft);
      max-width: 370px;
      margin-bottom: 52px;
    }

    .hero-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 20px;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: var(--pink-main);
      color: var(--card);
    }
    .btn-primary:hover { background: var(--pink-soft); }

    .btn-outline {
      background: transparent;
      color: var(--pink-main);
      border: 1.5px solid var(--pink-soft);
    }
    .btn-outline:hover { background: var(--pink-muted); }

    /* ── HERO RIGHT ── */
    .hero-right {
      background: var(--bg-soft);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 90px 64px;
      position: relative;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 12px 30px rgba(255,105,160,0.15); 
    }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 2.8rem;
      color: var(--text-main);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 0.72rem; color: var(--text-soft); letter-spacing: 0.3px; }

    .location-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff1b3;
      color: #8a6500;
      padding: 8px 18px;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      border: 1px solid #ffd966;
    }

    /* ── SECTIONS ── */
    section { position: relative; }
    .section-inner { max-width: 1020px; margin: 0 auto; padding: 104px 48px; }
    .section-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 52px; }
    .section-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--pink-main);
      flex-shrink: 0;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(2rem, 3.8vw, 3rem);
      color: var(--pink-main);
      line-height: 1.1;
    }
    .section-title em { font-style: italic; }

    /* ── SKILLS ── */
    #skills { background: var(--card); }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .skill-category {
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .skill-category:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(255,105,160,0.15); }
    .skill-cat-title { font-weight: 600; font-size: 0.82rem; letter-spacing: 0.3px; color: var(--text-main); margin-bottom: 16px; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .skill-tag {
      background: var(--pink-muted);
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--pink-main);
    }

    /* ── PROJECTS ── */
    #projects { background: var(--bg-main); }
    .projects-list { display: flex; flex-direction: column; gap: 24px; }
    .project-card {
      background: var(--card);
      border-radius: 16px;
      padding: 40px;
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: start;
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .project-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--pink-soft);
      transition: background 0.3s;
    }
    .project-card:hover { transform: translateX(4px); box-shadow: 0 12px 30px rgba(255,105,160,0.15); }
    .project-card:hover::before { background: var(--pink-main); }

    .project-number {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 3.5rem;
      color: var(--pink-soft);
      line-height: 1;
      opacity: 0.6;
    }
    .project-title { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.35rem; color: var(--text-main); margin-bottom: 12px; }
    .project-tech { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tech-badge { background: var(--pink-muted); color: var(--pink-main); padding: 3px 10px; border-radius: 12px; font-family: 'DM Mono', monospace; font-size: 0.68rem; font-weight: 400; }
    .project-desc { font-size: 0.88rem; line-height: 1.75; color: var(--text-soft); }
    .project-desc ul { padding-left: 14px; margin-top: 8px; }
    .project-desc li { margin-bottom: 4px; }

    /* ── RESEARCH EXPERIENCE ── */
    #experience { background: var(--pink-muted); }
    .timeline { position: relative; padding-left: 36px; }
    .timeline::before { content: ''; position: absolute; left: 0; top: 4px; bottom: 0; width: 1.5px; background: var(--pink-soft); }
    .timeline-item { position: relative; margin-bottom: 52px; }
    .timeline-item::before { content: ''; position: absolute; left: -42px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--pink-main); border: 2.5px solid var(--pink-muted); }
    .timeline-date { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 1px; color: var(--pink-main); margin-bottom: 8px; }
    .timeline-role { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.25rem; color: var(--text-main); margin-bottom: 4px; }
    .timeline-place { font-size: 0.8rem; color: var(--text-soft); margin-bottom: 12px; }
    .timeline-desc { font-size: 0.88rem; line-height: 1.75; color: var(--text-soft); max-width: 600px; }

    /* ── EDUCATION ── */
    #education { background: var(--bg-soft); }
    .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .edu-card {
      background: var(--card);
      border-radius: 16px;
      padding: 36px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .edu-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(255,105,160,0.15); }
    .edu-deg { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.25rem; color: var(--text-main); margin-bottom: 4px; }
    .edu-school { font-size: 0.82rem; color: var(--text-soft); margin-bottom: 20px; }
    .edu-year { display: inline-block; background: #fff1b3; color: #8a6500; padding: 4px 12px; border-radius: 12px; font-family: 'DM Mono', monospace; font-size: 0.7rem; border: 1px solid #ffd966; }

    .certs-section { margin-top: 52px; }
    .certs-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 18px; }
    .certs-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .cert-chip { background: var(--pink-muted); color: var(--pink-main); padding: 7px 16px; border-radius: 12px; font-size: 0.8rem; border: 1px solid var(--pink-soft); }

    /* ── CONFERENCES ── */
    #conferences { background: #fff3a6; }
    .conf-list { display: flex; flex-direction: column; gap: 14px; }
    .conf-item { display: flex; align-items: center; gap: 16px; padding: 20px 28px; background: var(--pink-muted); border-radius: 16px; border: 1px solid var(--pink-soft); font-size: 0.88rem; color: var(--text-main); transition: background 0.2s; }
    .conf-item:hover { background: var(--pink-soft); }
    .conf-dash { width: 16px; height: 1.5px; background: var(--pink-main); flex-shrink: 0; }

    /* ── FOOTER ── */
    footer { background: var(--text-main); text-align: center; padding: 90px 40px; }
    footer h2 { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 3rem; color: #fff; margin-bottom: 12px; }
    footer h2 em { font-style: italic; font-weight: 700; color: var(--pink-soft); }
    footer p { color: rgba(255,255,255,0.45); margin-bottom: 44px; font-size: 0.88rem; }
    .footer-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .footer-link { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); color: #fff; padding: 11px 22px; border-radius: 20px; text-decoration: none; font-size: 0.82rem; border: 1px solid rgba(255,255,255,0.12); transition: background 0.2s, transform 0.2s; }
    .footer-link:hover { background: var(--pink-soft); transform: translateY(-2px); }
    .footer-copy { margin-top: 64px; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; }
      .hero-left, .hero-right { padding: 64px 32px; }
      .edu-grid { grid-template-columns: 1fr; }
      .project-card { grid-template-columns: 1fr; }
      .section-inner { padding: 72px 28px; }
      .section-header { flex-direction: column; gap: 8px; }
    }

    /* ── FADE-IN ── */
    .fade-up { opacity: 0; transform: translateY(24px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .fade-up.visible { opacity: 1; transform: none; }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-left">
      <div class="deco-circle deco-c1"></div>
      <div class="deco-circle deco-c2"></div>
      <div class="deco-line"></div>
      <span class="hero-label">Hi, I’m</span>
      <h1 class="hero-name">Maria-Niki <em>Chatzantoni</em></h1>
      <span class="hero-title">Bioinformatics & Genomics</span>
      <p class="hero-desc">I specialize in integrating computational approaches with biological data to solve complex problems in genomics and bioinformatics. My work focuses on building pipelines, analyzing sequencing data, and visualizing results in meaningful ways.</p>
      <div class="hero-links">
        <a href="#" class="btn btn-primary">Download CV</a>
        <a href="#" class="btn btn-outline">Contact</a>
      </div>
    </div>
    <div class="hero-right">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num">5+</div>
          <div class="stat-label">Years Experience</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">20+</div>
          <div class="stat-label">Projects Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">15</div>
          <div class="stat-label">Publications</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">3</div>
          <div class="stat-label">Awards & Grants</div>
        </div>
      </div>
      <div class="location-pill">Athens, Greece</div>
    </div>
  </section>

  <!-- Further sections (skills, projects, experience, education, conferences, footer) go here with same styles -->

</body>
</html>
